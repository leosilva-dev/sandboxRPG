services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rpg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rpg}
      POSTGRES_DB: ${POSTGRES_DB:-rpg}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
